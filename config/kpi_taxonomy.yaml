# Anomaly detection rules
anomaly_rules:
  - name: "nrr_drop_2pp"
    description: "NRR drops more than 2 percentage points in one month"
    kpi: "nrr"
    condition: "mom_delta < -2"
    severity: "red"
    action: "Churn wave incoming in 60-90 days. Pull churn cohort data immediately."

  - name: "pipeline_below_3x"
    description: "Pipeline coverage below 3x for 2+ consecutive months"
    kpi: "pipeline_coverage"
    condition: "value < 3 AND consecutive_months >= 2"
    severity: "red"
    action: "ARR miss risk next quarter. CRO pipeline review needed."

  - name: "runway_below_12"
    description: "Cash runway below 12 months"
    kpi: "runway"
    condition: "value < 12"
    severity: "red"
    action: "Immediate board trigger. Raise flag with management."

  - name: "correlated_deterioration"
    description: "2 or more KPIs deteriorating simultaneously"
    kpi: "any"
    condition: "count_deteriorating >= 2 AND consecutive_months >= 1"
    severity: "red"
    action: "Immediate board discussion. Do not wait for trend confirmation."

  - name: "rule_of_40_below_30"
    description: "Rule of 40 below 30 for 3+ months"
    kpi: "rule_of_40"
    condition: "value < 30 AND consecutive_months >= 3"
    severity: "amber"
    action: "Growth or efficiency is structurally broken. Diagnose root cause."

  - name: "gross_margin_falling_arr_growing"
    description: "Gross margin declining while ARR is growing"
    kpi: "gross_margin"
    condition: "trend_3m == 'down' AND arr_trend_3m == 'up'"
    severity: "amber"
    action: "COGS creep. Audit hosting, support, implementation costs."

  - name: "nps_below_40"
    description: "NPS below 40 for 2+ consecutive months"
    kpi: "nps"
    condition: "value < 40 AND consecutive_months >= 2"
    severity: "amber"
    action: "Product-market fit drift or CS execution issue. Customer health audit."

  - name: "win_rate_falling_pipeline_up"
    description: "Win rate declining while pipeline is growing"
    kpi: "win_rate"
    condition: "trend_3m == 'down' AND pipeline_trend_3m == 'up'"
    severity: "amber"
    action: "Conversion problem. Run win/loss analysis on last 20 deals."

# RAG status rules
rag_rules:
  green: "At or above benchmark"
  amber: "Within 10% of benchmark"
  red: "More than 10% below benchmark"
  # For metrics where lower is better (churn, burn, CAC payback):
  green_inverse: "At or below benchmark"
  amber_inverse: "Within 10% above benchmark"
  red_inverse: "More than 10% above benchmark"
